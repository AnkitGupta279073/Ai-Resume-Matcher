<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Target / bullseye icon (centered, white) -->
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="9" stroke="white" stroke-width="2" fill="none" opacity="0.9"/>
  <!-- Middle ring -->
  <circle cx="16" cy="16" r="5.5" stroke="white" stroke-width="2" fill="none" opacity="0.9"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.2" fill="white"/>

  <!-- Crosshair lines -->
  <line x1="16" y1="5" x2="16" y2="8.5" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="16" y1="23.5" x2="16" y2="27" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="5" y1="16" x2="8.5" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="23.5" y1="16" x2="27" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
</svg>
